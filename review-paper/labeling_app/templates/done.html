<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Article Screening &mdash; Done</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>
<body>
  <header>
    <div class="page-title">Article Screening</div>
    <div class="progress-wrap"></div>
    <div class="header-controls">
      <button type="button" id="theme-toggle" class="theme-toggle"></button>
    </div>
  </header>
  <main class="done-screen">
    <h1>All caught up</h1>
    <p>{{ progress.done }} / {{ progress.total }} labeled. Nothing left in the sample.</p>
    <a class="nav-btn" href="{{ url_for('index', labeler=current_labeler, pos=total - 1) }}">&larr; Back to review answers</a>
  </main>
</body>
</html>
